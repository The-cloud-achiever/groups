trigger: none  # Manual or scheduled trigger only

variables:
- group: 'EntraID-Secrets'  # Secure variable group for credentials

pool:
  vmImage: 'windows-latest'

stages:
- stage: 'GenerateGroupReport'
  displayName: 'Generate Group Report'
  jobs:
  - job: 'GroupReport'
    displayName: 'Fetch Group Memberships (Delta)'
    steps:

    # Step 1: Install Python dependencies
    - script: |
        pip install -r $(Build.SourcesDirectory)/IK_Test/requirements.txt
      displayName: 'Install Python packages'

    # Step 2: Install wkhtmltopdf and ensure it is on PATH for subsequent steps
    - powershell: |
        Set-ExecutionPolicy Bypass -Scope Process -Force
        choco install wkhtmltopdf -y
        $wkPath = 'C:\Program Files\wkhtmltopdf\bin'
        Write-Host "##vso[task.prependpath]$wkPath"
        wkhtmltopdf --version
      displayName: 'Install wkhtmltopdf'

    # Step 3: Download previous delta state (non-blocking — missing on first run)
    - task: DownloadPipelineArtifact@2
      displayName: 'Download previous delta state'
      continueOnError: true
      inputs:
        artifact: 'group-report-artifacts'
        path: '$(Pipeline.Workspace)/group-report-artifacts'
        source: 'specific'
        project: '$(System.TeamProject)'
        pipeline: 7
        runVersion: 'latest'

    # Step 4: Run the delta report script
    - script: |
        python $(Build.SourcesDirectory)/IK_Test/get_test_with_sort.py
      displayName: 'Run Group Delta Report'
      env:
        TENANT_ID: $(TENANT_ID)
        CLIENT_ID: $(CLIENT_ID)
        CLIENT_SECRET: $(CLIENT_SECRET)
        GROUPS_FILTER: $(GROUPS_FILTER)
        SENDER_EMAIL: $(SENDER_EMAIL)
        RECIPIENT_EMAIL: $(RECIPIENT_EMAIL)
        BUILD_ARTIFACTSTAGINGDIRECTORY: $(Build.ArtifactStagingDirectory)
        PIPELINE_WORKSPACE: $(Pipeline.Workspace)

    # Step 5: Publish delta state + reports for the next run
    - task: PublishPipelineArtifact@1
      displayName: 'Publish group report artifacts'
      inputs:
        targetPath: '$(Build.ArtifactStagingDirectory)'
        artifact: 'group-report-artifacts'
        publishLocation: 'pipeline'
      condition: always()
